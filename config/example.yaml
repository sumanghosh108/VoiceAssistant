# Example YAML configuration file for Real-Time Voice Assistant
# This file demonstrates all available configuration options
# 
# To use this file, set the CONFIG_FILE environment variable:
#   export CONFIG_FILE=config/example.yaml
#
# Note: API keys should be provided via environment variables for security

# API Configuration (keys should be in environment variables)
# whisper_api_key: "your-whisper-api-key"
# gemini_api_key: "your-gemini-api-key"
# elevenlabs_api_key: "your-elevenlabs-api-key"
# elevenlabs_voice_id: "your-voice-id"

whisper_timeout: 3.0
gemini_model: "gemini-pro"
gemini_timeout: 5.0
elevenlabs_timeout: 3.0

# Server Configuration
websocket_host: "0.0.0.0"
websocket_port: 8000
metrics_host: "0.0.0.0"
metrics_port: 8001

# Pipeline Configuration
audio_buffer_ms: 1000
token_buffer_size: 10
max_conversation_turns: 10

# Resilience Configuration
retry_max_attempts: 3
retry_initial_delay_ms: 100
retry_max_delay_ms: 5000

cb_failure_threshold: 0.5
cb_window_size: 10
cb_timeout_seconds: 30

# Observability Configuration
enable_recording: false
recording_path: "./recordings"
log_level: "INFO"

latency_budget_asr_ms: 500
latency_budget_llm_ms: 300
latency_budget_tts_ms: 400
latency_budget_e2e_ms: 2000
